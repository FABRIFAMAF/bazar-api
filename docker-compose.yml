services:

  bazar_app:
    build: .
    container_name: bazar_app
    mem_limit: 512m

    ports:
      - "8080:8080"

    environment:
      DB_URL: jdbc:mysql://bazar_db:3306/bazar?createDatabaseIfNotExist=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}

    depends_on:
      bazar_db:
        condition: service_healthy

    restart: unless-stopped


  bazar_db:
    image: mysql:8.4
    container_name: bazar_db

    ports:
      - "3307:3306"

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: bazar

    volumes:
      - bazar_mysql_data:/var/lib/mysql

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    restart: unless-stopped


volumes:
  bazar_mysql_data: